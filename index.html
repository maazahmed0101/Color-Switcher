<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color searcher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="heading">color Switcher</h1>
        <div class="inputBtnContainer">
            <button class="randomBTN">Random-color</button>
            <input id="colorInput" type="text" placeholder="Enter a color or hex (e.g. White or #ffffff)">
            <button class="applyBTN">AppltColor</button>
        </div>
        <p class="currentColor">current Color:
            <span class="currentColorValue">green</span>
        </p>
    </div>
    <script src="script.js"></script>
</body>

</html>
